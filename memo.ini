
# セッション更新メモ
今後、Instagram セッションが再び切れた場合は以下のコマンドで更新してください：

cd /Users/szk/Desktop/APP/instagram-slack-notify

# Chromeのクッキーから新しいセッションを取得
instaloader --load-cookies chrome --sessionfile .instagram_session

# GitHubシークレット用にbase64でコピー
base64 -i .instagram_session | pbcopy
# → GitHub Settings > Secrets > INSTAGRAM_SESSION を更新

